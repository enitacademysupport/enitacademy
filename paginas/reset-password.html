<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ENIT Academy — Restablecer contraseña</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Paytone+One&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.js"></script>
  <style>
    :root {
      --rosa:      #ff4fa0;
      --lila:      #8b5cf6;
      --fondo:     #fff8fc;
      --blanco:    #fff;
      --borde:     #f0d6e8;
      --texto:     #2a1a33;
      --claro:     #9178a6;
      --gradiente: linear-gradient(135deg, var(--rosa), var(--lila));
      --error:     #d6185a;
      --ok:        #1aaa6b;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--fondo);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    /* ── Caja principal ── */
    .caja {
      background: var(--blanco);
      border-radius: 24px;
      width: 100%;
      max-width: 440px;
      overflow: hidden;
      box-shadow: 0 16px 48px rgba(255,79,160,0.14);
      border: 1.5px solid var(--borde);
    }

    /* ── Cabecera degradado ── */
    .caja-cabecera {
      background: var(--gradiente);
      padding: 2.2rem 2rem 1.8rem;
      text-align: center;
      color: var(--blanco);
    }

    .caja-cabecera .icono {
      width: 64px; height: 64px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1rem;
      font-size: 1.6rem;
    }

    .caja-cabecera h1 {
      font-family: 'Paytone One', sans-serif;
      font-size: 1.4rem;
      margin-bottom: 0.3rem;
    }

    .caja-cabecera p {
      font-size: 0.88rem;
      opacity: 0.9;
      line-height: 1.5;
    }

    /* ── Cuerpo del formulario ── */
    .caja-cuerpo {
      padding: 2rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .campo {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }

    .campo label {
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--texto);
    }

    .campo-con-ojo {
      position: relative;
      display: flex;
      align-items: center;
    }

    .campo-con-ojo input {
      width: 100%;
      padding: 0.65rem 2.8rem 0.65rem 0.95rem;
      border: 1.8px solid var(--borde);
      border-radius: 10px;
      font-family: 'Nunito', sans-serif;
      font-size: 0.92rem;
      color: var(--texto);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .campo-con-ojo input:focus {
      border-color: var(--rosa);
      box-shadow: 0 0 0 3px rgba(255,79,160,0.1);
    }

    .campo-con-ojo input::placeholder { color: #cbb8d4; }

    .btn-ojo {
      position: absolute;
      right: 0.75rem;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--claro);
      font-size: 0.95rem;
      padding: 0;
      transition: color 0.15s;
    }
    .btn-ojo:hover { color: var(--rosa); }

    .error-campo {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--error);
      min-height: 1em;
    }

    /* ── Requisitos de contraseña ── */
    .requisitos {
      background: #f5f0ff;
      border-radius: 10px;
      padding: 0.8rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }

    .req {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--claro);
      transition: color 0.2s;
    }

    .req i { width: 14px; text-align: center; }
    .req.cumple { color: var(--ok); }
    .req.cumple i::before { content: "\f058"; } /* fa-circle-check */

    /* ── Alerta general ── */
    .alerta {
      display: none;
      align-items: center;
      gap: 0.55rem;
      padding: 0.7rem 1rem;
      border-radius: 10px;
      font-size: 0.87rem;
      font-weight: 700;
      border: 1.5px solid transparent;
    }
    .alerta.visible    { display: flex; }
    .alerta-error { background: #fff0f5; border-color: #f9b8d4; color: var(--error); }
    .alerta-ok    { background: #effaf5; border-color: #a3e6c8; color: var(--ok); }
    .alerta i { font-size: 1rem; flex-shrink: 0; }

    /* ── Botón ── */
    .btn-guardar {
      width: 100%;
      padding: 0.82rem;
      background: var(--gradiente);
      color: var(--blanco);
      border: none;
      border-radius: 50px;
      font-family: 'Nunito', sans-serif;
      font-size: 0.97rem;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(255,79,160,0.2);
      transition: opacity 0.2s, transform 0.15s;
    }
    .btn-guardar:hover:not(:disabled) { opacity: 0.88; transform: translateY(-2px); }
    .btn-guardar:disabled { background: #e2d5ee; color: #b8a8cc; box-shadow: none; cursor: not-allowed; }

    /* ── Link volver ── */
    .link-volver {
      text-align: center;
      font-size: 0.83rem;
      color: var(--claro);
    }
    .link-volver a {
      color: var(--rosa);
      font-weight: 700;
      text-decoration: none;
    }
    .link-volver a:hover { text-decoration: underline; }

    /* ── Estado éxito ── */
    .estado-exito {
      display: none;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 1rem;
      padding: 2rem;
    }

    .estado-exito .icono-exito {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: var(--gradiente);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.8rem;
      color: var(--blanco);
    }

    .estado-exito h2 {
      font-family: 'Paytone One', sans-serif;
      font-size: 1.3rem;
      color: var(--texto);
    }

    .estado-exito p {
      font-size: 0.9rem;
      color: var(--claro);
      line-height: 1.6;
    }

    .btn-ir-inicio {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.7rem 1.8rem;
      background: var(--gradiente);
      color: var(--blanco);
      border-radius: 50px;
      font-weight: 800;
      font-size: 0.92rem;
      text-decoration: none;
      box-shadow: 0 4px 14px rgba(255,79,160,0.2);
      transition: opacity 0.2s, transform 0.15s;
    }
    .btn-ir-inicio:hover { opacity: 0.88; transform: translateY(-2px); }
  </style>
</head>
<body>

<div class="caja">

  <!-- Cabecera -->
  <div class="caja-cabecera">
    <div class="icono"><i class="fa-solid fa-lock"></i></div>
    <h1>Nueva contraseña</h1>
    <p>Elige una contraseña segura para tu cuenta de ENIT Academy.</p>
  </div>

  <!-- Formulario -->
  <div class="caja-cuerpo" id="formulario">

    <div class="campo">
      <label for="nuevaClave">Nueva contraseña</label>
      <div class="campo-con-ojo">
        <input type="password" id="nuevaClave" placeholder="Mínimo 6 caracteres">
        <button type="button" class="btn-ojo" data-objetivo="nuevaClave" aria-label="Mostrar contraseña">
          <i class="fa-regular fa-eye"></i>
        </button>
      </div>
      <small class="error-campo" id="errNueva"></small>
    </div>

    <div class="campo">
      <label for="confirmarClave">Confirmar contraseña</label>
      <div class="campo-con-ojo">
        <input type="password" id="confirmarClave" placeholder="Repite tu contraseña">
        <button type="button" class="btn-ojo" data-objetivo="confirmarClave" aria-label="Mostrar contraseña">
          <i class="fa-regular fa-eye"></i>
        </button>
      </div>
      <small class="error-campo" id="errConfirmar"></small>
    </div>

    <!-- Requisitos visuales -->
    <div class="requisitos">
      <div class="req" id="reqLongitud">
        <i class="fa-regular fa-circle"></i>
        <span>Mínimo 6 caracteres</span>
      </div>
      <div class="req" id="reqMayuscula">
        <i class="fa-regular fa-circle"></i>
        <span>Al menos una mayúscula</span>
      </div>
      <div class="req" id="reqNumero">
        <i class="fa-regular fa-circle"></i>
        <span>Al menos un número</span>
      </div>
    </div>

    <div class="alerta" id="alerta"></div>

    <button class="btn-guardar" id="btnGuardar">
      <i class="fa-solid fa-floppy-disk"></i> Guardar contraseña
    </button>

    <p class="link-volver">
      <a href="/index.html"><i class="fa-solid fa-arrow-left"></i> Volver al inicio</a>
    </p>

  </div>

  <!-- Estado éxito -->
  <div class="estado-exito" id="estadoExito">
    <div class="icono-exito"><i class="fa-solid fa-circle-check"></i></div>
    <h2>¡Contraseña actualizada!</h2>
    <p>Tu contraseña ha sido cambiada correctamente. Ya puedes iniciar sesión.</p>
    <a href="index.html" class="btn-ir-inicio">
      <i class="fa-solid fa-house"></i> Ir al inicio
    </a>
  </div>

</div>

<script type="module" src="../js/reset-password.js"></script>
</body>
</html>
