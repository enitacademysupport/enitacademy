<!DOCTYPE html>
<html lang="es" data-bs-theme="light">
<head>
  <script>const dm=localStorage.getItem("modoOscuro")==="true";if(dm){document.documentElement.setAttribute("data-bs-theme","dark");document.documentElement.classList.add("dark");}</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ENIT Academy — Restablecer contraseña</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Paytone+One&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/header_footer.css">
  <link rel="stylesheet" href="/css/verificar-email.css">
  <link rel="stylesheet" href="/css/reset_password_extra.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.js"></script>
</head>
<body>

<header id="header"></header>

<main class="verificar-main">
  <div class="card">
    <div class="card-header">
      <div class="card-logo">ENIT Academy</div>
      <div class="icon-wrap">🔒</div>
      <h1>Nueva contraseña</h1>
      <p>Elige una contraseña segura para<br>tu cuenta de ENIT Academy.</p>
    </div>

    <div class="card-body" id="formulario">
      <div class="campo">
        <label for="nuevaClave">Nueva contraseña</label>
        <div class="campo-con-ojo">
          <input type="password" id="nuevaClave" placeholder="Mínimo 6 caracteres">
          <button type="button" class="btn-ojo" data-objetivo="nuevaClave" aria-label="Mostrar contraseña">
            <i class="fa-regular fa-eye"></i>
          </button>
        </div>
        <small class="error-campo" id="errNueva"></small>
      </div>

      <div class="campo">
        <label for="confirmarClave">Confirmar contraseña</label>
        <div class="campo-con-ojo">
          <input type="password" id="confirmarClave" placeholder="Repite tu contraseña">
          <button type="button" class="btn-ojo" data-objetivo="confirmarClave" aria-label="Mostrar contraseña">
            <i class="fa-regular fa-eye"></i>
          </button>
        </div>
        <small class="error-campo" id="errConfirmar"></small>
      </div>

      <div class="requisitos">
        <div class="req" id="reqLongitud"><i class="fa-regular fa-circle"></i><span>Mínimo 6 caracteres</span></div>
        <div class="req" id="reqMayuscula"><i class="fa-regular fa-circle"></i><span>Al menos una mayúscula</span></div>
        <div class="req" id="reqNumero"><i class="fa-regular fa-circle"></i><span>Al menos un número</span></div>
      </div>

      <div class="feedback" id="alerta"></div>

      <button class="btn-verify" id="btnGuardar">
        <span class="spinner"></span>
        <span class="btn-label"><i class="fa-solid fa-floppy-disk"></i> Guardar contraseña</span>
      </button>

      <div class="resend">
        <a href="/index.html" style="color:var(--texto-claro); text-decoration:none; font-weight:700; font-size:0.85rem;">
          <i class="fa-solid fa-arrow-left"></i> Volver al inicio
        </a>
      </div>
    </div>

    <div class="success-overlay" id="estadoExito">
      <div class="check-circle">✓</div>
      <h2>¡Contraseña actualizada!</h2>
      <p>Tu contraseña ha sido cambiada correctamente. Ya puedes iniciar sesión.</p>
      <a href="/index.html" class="btn-ir-inicio"><i class="fa-solid fa-house"></i> Ir al inicio</a>
    </div>
  </div>
</main>

<footer id="footer"></footer>

<script type="module" src="/js/login.js"></script>
<script type="module" src="/js/header_footer.js"></script>
<script type="module" src="../js/reset-password.js"></script>
</body>
</html>
