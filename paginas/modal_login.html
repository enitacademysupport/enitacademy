<section id="modalLogin" class="modal">

    <section class="modal-contenido">

        <span class="cerrar">&times;</span>

        <section class="login-box">

            <article>
                <h2>Bienvenid@</h2>
                <p>Inicia sesión para continuar</p>
            </article>

            <form id="formLogin">

                <input type="email" id="loginEmail" placeholder="Correo electrónico" required>

                <section class="password-box">
                    <input type="password" id="loginPassword" placeholder="Contraseña" required>
                    <i class="fa-solid fa-eye" id="togglePassword"></i>
                </section>

                <button type="submit">Ingresar</button>

            </form>

        </section>

    </section>

</section>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
document.addEventListener("DOMContentLoaded", () => {

    const supabaseClient = supabase.createClient(
        "https://ugjgpirjcmyjfsgspajd.supabase.co",
        ""eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVnamdwaXJqY215amZzZ3NwYWpkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4NDI2MDAsImV4cCI6MjA5MzQxODYwMH0.OuERi9MUuFbxnC2Jvj_bjO4W90FbHagBKmvPSsd6Hm4""
    );

    const form = document.getElementById("formLogin");
    const password = document.getElementById("loginPassword");
    const toggle = document.getElementById("togglePassword");

    // 👁 ojito
    toggle.onclick = () => {
        password.type = password.type === "password" ? "text" : "password";
        toggle.classList.toggle("fa-eye-slash");
    };

    // 🔐 login
    form.onsubmit = async (e) => {
        e.preventDefault();

        const email = document.getElementById("loginEmail").value.trim();

        const { error } = await supabaseClient.auth.signInWithPassword({
            email,
            password: password.value
        });

        if (error) return alert(error.message);

        window.location.href = "perfilestudiante.html";
    };

});
</script>
