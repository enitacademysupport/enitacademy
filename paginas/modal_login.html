<div id="modalLogin" class="modal-fondo">
  <div class="modal-caja">
    <button class="cerrar" aria-label="Cerrar">&times;</button>

    <div class="login-contenido">

      <!-- Panel izquierdo decorativo -->
      <div class="login-bienvenida">
        <div class="login-bienvenida-icono">
          <i class="fa-solid fa-graduation-cap"></i>
        </div>
        <h2>¡Bienvenid@!</h2>
        <p>Continúa aprendiendo inglés con clases modernas y divertidas.</p>
        <ul class="login-bienvenida-features">
          <li><i class="fa-solid fa-check"></i> Clases en vivo</li>
          <li><i class="fa-solid fa-check"></i> Todos los niveles</li>
          <li><i class="fa-solid fa-check"></i> Docentes especializados</li>
        </ul>
      </div>

      <!-- Formulario -->
      <div class="login-formulario">
        <h3>Iniciar sesión</h3>

        <form id="loginForm" novalidate>
          <div class="campo">
            <label for="loginEmail">Correo electrónico</label>
            <div class="envoltorio-input">
              <i class="fa-solid fa-envelope campo-icono"></i>
              <input type="email" id="loginEmail" placeholder="tu@correo.com" autocomplete="email">
            </div>
          </div>

          <div class="campo campo-clave">
            <label for="loginPassword">Contraseña</label>
            <div class="envoltorio-input">
              <i class="fa-solid fa-lock campo-icono"></i>
              <input type="password" id="loginPassword" placeholder="Tu contraseña" autocomplete="current-password">
              <i class="fa-solid fa-eye ojo-clave" id="togglePassword"></i>
            </div>
          </div>

          <div class="opciones-login">
            <a href="../paginas/solicitar-reset.html" id="resetPassword">¿Olvidaste tu contraseña?</a>
          </div>

          <div id="loginAlerta" class="form-alerta"></div>

          <button type="submit" class="btn-ingresar-form">
            <i class="fa-solid fa-right-to-bracket"></i> Ingresar
          </button>

          <p class="link-registro">
            ¿No tienes cuenta? <a href="/paginas/registrarse.html">Regístrate</a>
          </p>
        </form>
      </div>

    </div>
  </div>
</div>
