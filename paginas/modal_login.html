<div id="modalLogin" class="modal">

    <div class="modal-contenido">

        <span class="cerrar">&times;</span>

        <div class="login-box">

            <div class="lado-info">
                <h2>Bienvenid@</h2>
                <p>
                    Continúa aprendiendo inglés con clases modernas,
                    dinámicas y diseñadas para ti.
                </p>
            </div>

            <div class="lado-formulario">

                <h3>Iniciar Sesión</h3>

                <form id="formLogin">

                    <div class="grupo-input">
                        <input type="email" id="loginEmail" placeholder="Correo electrónico" required>
                    </div>

                    <div class="grupo-input password-box">
                        <input type="password" id="loginPassword" placeholder="Contraseña" required>
                        <i class="fa-solid fa-eye" id="togglePassword"></i>
                    </div>

                    <div class="opciones-login">
                        <label>
                            <input type="checkbox">
                            Recordarme
                        </label>

                        <a href="#">¿Olvidaste tu contraseña?</a>
                    </div>

                    <button type="submit">Ingresar</button>

                    <p class="crear-cuenta">
                        ¿No tienes cuenta?
                        <a href="../paginas/registrarse.html">Regístrate</a>
                    </p>

                </form>

            </div>

        </div>

    </div>

</div>


<script>
document.addEventListener("DOMContentLoaded", function() {

    const formLogin = document.getElementById("formLogin");

    if (formLogin) {
        formLogin.addEventListener("submit", async function(e) {
            e.preventDefault();

            const email = document.getElementById("loginEmail").value.trim();
            const password = document.getElementById("loginPassword").value.trim();

            const { data, error } = await supabaseClient.auth.signInWithPassword({
                email: email,
                password: password
            });

            if (error) {
                alert("Error: " + error.message);
                return;
            }

            alert("Bienvenido 🎉");

            // cerrar modal (opcional)
            document.getElementById("modalLogin").style.display = "none";

            // redirigir
            window.location.href = "perfilestudiante.html";
        });
    }

});
</script>
