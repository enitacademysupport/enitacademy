<div id="modalLogin" class="modal">

    <div class="modal-contenido">

        <span class="cerrar">&times;</span>

        <div class="login-box">

            <div class="lado-info">
                <h2>Bienvenid@</h2>
                <p>
                    Continúa aprendiendo inglés con clases modernas,
                    dinámicas y diseñadas para ti.
                </p>
            </div>

            <div class="lado-formulario">

                <h3>Iniciar Sesión</h3>

                <form id="loginForm">

                    <div class="grupo-input">
                        <input type="email" placeholder="Correo electrónico">
                    </div>

                    <div class="grupo-input password-box">
                        <input type="password" id="password" placeholder="Contraseña">
                        <i class="fa-solid fa-eye" id="togglePassword"></i>
                    </div>

                    <div class="opciones-login">
                        <label>
                            <input type="checkbox">
                            Recordarme
                        </label>

                        <a href="#" id="resetPassword">¿Olvidaste tu contraseña?</a>
                    </div>

                    <button type="submit">Ingresar</button>

                    <p class="crear-cuenta">
                        ¿No tienes cuenta?
                        <a href="../paginas/registrarse.html">Regístrate</a>
                    </p>

                </form>

            </div>

        </div>

    </div>

</div>

<script>
    document.addEventListener("click", function(e){

    const modal = document.getElementById("modalLogin");

    // =========================
    // ABRIR MODAL
    // =========================
    if(e.target.closest("#btnLogin") || e.target.closest(".abrir-login")){
    e.preventDefault();
    modal.style.display = "flex";
}

    // =========================
    // CERRAR MODAL
    // =========================
    if(e.target.classList.contains("cerrar")){
        if(modal) modal.style.display = "none";
    }

    if(e.target.id === "modalLogin"){
        if(modal) modal.style.display = "none";
    }

    // =========================
    // OJITO PASSWORD
    // =========================
    if(e.target.id === "togglePassword"){

        const input = document.getElementById("password");

        if(!input) return;

        const type = input.type === "password" ? "text" : "password";
        input.type = type;

        e.target.classList.toggle("fa-eye");
        e.target.classList.toggle("fa-eye-slash");
    }

});


document.getElementById("resetPassword").addEventListener("click", async () => {

    const email = prompt("Ingresa tu correo");

    if (!email) return;

    const { error } = await supabase.auth.resetPasswordForEmail(email, {
        redirectTo: "http://localhost:5500/paginas/reset-password.html"
    });

    if (error) {
        alert(error.message);
        return;
    }

    alert("Revisa tu correo para restablecer tu contraseña");
});

</script>
