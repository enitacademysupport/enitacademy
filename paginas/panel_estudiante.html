<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ENIT Academy — Panel Estudiante</title>
  <link rel="stylesheet" href="../css/header_footer.css">
  <link rel="stylesheet" href="../css/panel.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Paytone+One&display=swap" rel="stylesheet">
</head>
<body>
  <div id="header"></div>
  <div id="fondoSidebar" class="fondo-sidebar"></div>

  <main class="panel-contenedor">

    <!-- SIDEBAR -->
    <aside class="panel-sidebar">
      <div class="perfil-sidebar">
        <div class="avatar-sidebar"><i class="fa-solid fa-user-graduate"></i></div>
        <div>
          <p class="nombre-sidebar" id="sideNombre">Cargando...</p>
          <span class="rol-sidebar">Estudiante</span>
        </div>
      </div>

      <nav class="nav-sidebar">
        <button class="nav-btn activo" data-vista="cursos"><i class="fa-solid fa-book-open"></i> Mis cursos</button>
        <button class="nav-btn" data-vista="anuncios"><i class="fa-solid fa-bullhorn"></i> Anuncios</button>
        <button class="nav-btn" data-vista="archivos"><i class="fa-solid fa-folder-open"></i> Archivos</button>
        <button class="nav-btn" data-vista="tareas"><i class="fa-solid fa-clipboard-list"></i> Tareas</button>
        <button class="nav-btn" data-vista="unirse"><i class="fa-solid fa-key"></i> Unirse a curso</button>
        <button class="nav-btn" data-vista="perfil"><i class="fa-solid fa-user-pen"></i> Mi perfil</button>
      </nav>

      <button class="btn-salir" id="btnSalir"><i class="fa-solid fa-right-from-bracket"></i> Cerrar sesión</button>
    </aside>

    <!-- CONTENIDO -->
    <div class="panel-cuerpo">

      <div class="barra-movil">
        <button id="btnAbrirSidebar" class="btn-hamburguesa-panel"><span></span><span></span><span></span></button>
        <span class="titulo-panel">Panel Estudiante</span>
      </div>

      <section class="panel-seccion">

        <!-- Stats -->
        <div class="barra-stats">
          <div class="stat-card"><i class="fa-solid fa-book-open"></i><div><span id="statCursos">0</span><p>Cursos</p></div></div>
          <div class="stat-card"><i class="fa-solid fa-chalkboard-teacher"></i><div><span id="statDocentes">0</span><p>Docentes</p></div></div>
          <div class="stat-card"><i class="fa-solid fa-graduation-cap"></i><div><span id="statNivel">—</span><p>Último nivel</p></div></div>
        </div>

        <!-- Vista: cursos -->
        <div id="vista-cursos" class="vista">
          <div class="vista-cabecera">
            <h2>Mis cursos</h2>
            <button class="btn-primario btn-pequeno" onclick="document.querySelector('[data-vista=unirse]').click()">
              <i class="fa-solid fa-plus"></i> Unirse
            </button>
          </div>
          <div id="listaCursos" class="grilla-cursos">
            <p class="sin-datos" id="msgSinCursos">Aún no estás inscrito en ningún curso.</p>
          </div>
        </div>

        <!-- Vista: anuncios -->
        <div id="vista-anuncios" class="vista oculto">
          <div class="vista-cabecera">
            <h2>Anuncios</h2>
            <select id="filtroAnuncios" class="select-filtro"><option value="">Todos los cursos</option></select>
          </div>
          <div id="listaAnuncios" class="lista-anuncios"></div>
        </div>

        <!-- Vista: archivos -->
        <div id="vista-archivos" class="vista oculto">
          <div class="vista-cabecera">
            <h2>Archivos</h2>
            <select id="filtroArchivos" class="select-filtro"><option value="">Todos los cursos</option></select>
          </div>
          <div id="listaArchivos" class="lista-archivos"></div>
        </div>

        <!-- Vista: tareas -->
        <div id="vista-tareas" class="vista oculto">
          <div class="vista-cabecera">
            <h2>Tareas</h2>
            <select id="filtroTareas" class="select-filtro"><option value="">Todos los cursos</option></select>
          </div>
          <div id="listaTareas" class="lista-tareas"></div>
        </div>

        <!-- Vista: unirse -->
        <div id="vista-unirse" class="vista oculto">
          <h2>Unirse a un curso</h2>
          <p class="texto-subtitulo">Ingresa el código que te dio tu docente.</p>
          <form id="formCodigo" class="formulario formulario-angosto" novalidate>
            <div class="campo">
              <label for="inputCodigo">Código del curso</label>
              <div class="campo-con-icono">
                <i class="fa-solid fa-key icono-campo"></i>
                <input type="text" id="inputCodigo" placeholder="Ej: AB3X9QZK" autocomplete="off">
              </div>
              <small class="error" id="errCodigo"></small>
            </div>
            <div id="alertaCodigo" class="alerta"></div>
            <button type="submit" class="btn-primario"><i class="fa-solid fa-right-to-bracket"></i> Unirme</button>
          </form>
        </div>

        <!-- Vista: perfil -->
        <div id="vista-perfil" class="vista oculto">
          <h2>Mi perfil</h2>
          <form id="formPerfil" class="formulario" novalidate>

            <div class="seccion-avatar-perfil">
              <div class="avatar-grande"><i class="fa-solid fa-user-graduate"></i></div>
              <div>
                <span class="etiqueta-rol-perfil"><i class="fa-solid fa-user-graduate"></i> Estudiante</span>
                <p class="texto-desde" id="perfilDesde"></p>
              </div>
            </div>

            <div class="fila-formulario">
              <div class="campo">
                <label for="pNombre">Nombre</label>
                <input type="text" id="pNombre">
                <small class="error" id="errPNombre"></small>
              </div>
              <div class="campo">
                <label for="pApellido">Apellido</label>
                <input type="text" id="pApellido">
                <small class="error" id="errPApellido"></small>
              </div>
            </div>

            <div class="campo">
              <label for="pEmail">Correo</label>
              <input type="email" id="pEmail" disabled>
              <small class="nota">El correo no se puede cambiar.</small>
            </div>

            <hr class="divisor">
            <h3>Cambiar contraseña</h3>

            <div class="campo">
              <label for="pClave">Nueva contraseña</label>
              <div class="campo-con-ojo">
                <input type="password" id="pClave" placeholder="Mínimo 6 caracteres">
                <button type="button" class="btn-ojo" data-objetivo="pClave"><i class="fa-regular fa-eye"></i></button>
              </div>
              <small class="error" id="errPClave"></small>
            </div>

            <div id="alertaPerfil" class="alerta"></div>
            <button type="submit" class="btn-primario"><i class="fa-solid fa-floppy-disk"></i> Guardar cambios</button>
          </form>
        </div>

      </section>
    </div>
  </main>

  <script type="module" src="../js/header_footer.js"></script>
  <script type="module" src="../js/panel_estudiante.js"></script>
</body>
</html>
