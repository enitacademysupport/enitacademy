<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ENIT Academy</title>
<link rel="stylesheet" href="../css/contactanos.css">
<link rel="stylesheet" href="../css/header_footer.css">
<link rel="stylesheet" href="../css/login.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<div id="header"></div>
<div id="modal-container"></div>

<!-- ========================= -->
<!--       CONTÁCTANOS        -->
<!-- ========================= -->

<section class="seccion-contacto">

    <div class="contenedor-contacto">

        <!-- INFORMACIÓN -->
        <div class="info-contacto">

            <span class="etiqueta-contacto">Hablemos</span>

            <h2>Contáctanos</h2>

            <p class="texto-contacto">
                Estamos aquí para ayudarte. Si tienes dudas sobre cursos,
                registro, soporte o cualquier consulta, escríbenos.
            </p>

            <div class="dato-contacto">
                <h4>Correo</h4>
                <p>enit_academy@gmail.com</p>
            </div>

            <div class="dato-contacto">
                <h4>Teléfono</h4>
                <p>+51 914 237 616</p>
            </div>


            <div class="dato-contacto">
                <h4>Ubicación</h4>
                <p>Villa El Salvador, Lima-Perú</p>
            </div>

        </div>


        <!-- FORMULARIO -->
        <div class="formulario-contacto">

            <h3>Envíanos un mensaje</h3>

            <form>

                <div class="grupo-campo">
                    <input type="text" placeholder="Nombre completo">
                </div>

                <div class="grupo-campo">
                    <input type="email" placeholder="Correo electrónico">
                </div>

                <div class="grupo-campo">
                    <input type="text" placeholder="Asunto">
                </div>

                <div class="grupo-campo">
                    <textarea placeholder="Escribe tu mensaje"></textarea>
                </div>

                <button type="submit">Enviar Mensaje</button>

            </form>

        </div>

    </div>

</section>


<div id="footer"></div>

<script src="/js/header_footer.js"></script>
<script src="/js/login.js"></script>
</body>

</html>
