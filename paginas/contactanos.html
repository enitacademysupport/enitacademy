<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ENIT Academy</title>
<link rel="stylesheet" href="../css/contactanos.css">
<link rel="stylesheet" href="../css/header_footer.css">
<link rel="stylesheet" href="../css/login.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="../css/index.css">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Paytone+One&display=swap" rel="stylesheet">


  
</head>

<body>

<div id="header"></div>
<div id="modal-container"></div>


<section class="seccion-contacto">

    <div class="contenedor-contacto">

        <div class="info-contacto">

            <span class="etiqueta-contacto">Hablemos</span>

            <h2>Contáctanos</h2>

            <p class="texto-contacto">
                Estamos aquí para ayudarte. Si tienes dudas sobre cursos,
                registro, soporte o cualquier consulta, escríbenos.
            </p>

            <div class="dato-contacto">
                <h4>Correo</h4>
                <p>enit_academy@gmail.com</p>
            </div>

            <div class="dato-contacto">
                <h4>Teléfono</h4>
                <p>+51 914 237 616</p>
            </div>


            <div class="dato-contacto">
                <h4>Ubicación</h4>
                <p>Villa El Salvador, Lima-Perú</p>
            </div>

        </div>


        <div class="formulario-contacto">

            <h3>Envíanos un mensaje</h3>

            <form id="form-contacto">

    <div class="grupo-campo">
        <input type="text" id="nombre" placeholder="Nombre completo" required>
    </div>

    <div class="grupo-campo">
        <input type="email" id="correo" placeholder="Correo electrónico" required>
    </div>

    <div class="grupo-campo">
        <input type="text" id="asunto" placeholder="Asunto" required>
    </div>

    <div class="grupo-campo">
        <textarea id="mensaje" placeholder="Escribe tu mensaje" required></textarea>
    </div>

    <button type="submit">Enviar Mensaje</button>
    <div id="mensaje-exito" class="mensaje-exito">
    <i class="fas fa-check-circle"></i>
    ¡Tu mensaje fue enviado correctamente!
</div>
    

</form>

        </div>

    </div>

</section>


<div id="footer"></div>

  <script type="module" src="../js/header_footer.js"></script>
<script type="module" src="../js/contactanos.js"></script>
<script type="module" src="../js/header_footer.js"></script>
</body>

</html>
