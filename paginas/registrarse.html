<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ENIT Academy</title>
<link rel="stylesheet" href="../css/registrarse.css">
<link rel="stylesheet" href="../css/header_footer.css">
<link rel="stylesheet" href="../css/login.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<div id="header"></div>
<div id="modal-container"></div>

<section class="seccion-register">

<div class="register-box">

    <div class="lado-bienvenida">

        <h2>¡Únete hoy!</h2>

        <p>
            Crea tu cuenta y empieza a aprender inglés
            con cursos dinámicos, modernos y fáciles.
        </p>

    </div>


    <div class="lado-formulario">

        <h3>Crear Cuenta</h3>

        <form id="formRegistro">

            <div class="fila-input">

                <div class="grupo-input">
                    <input type="text" id="nombre" placeholder="Nombre" required>
                </div>

                <div class="grupo-input">
                    <input type="text" id="apellido" placeholder="Apellido" required>
                </div>

            </div>

            <div class="grupo-input">
                <input type="email" id="email" placeholder="Correo electrónico" required>
            </div>

            <div class="grupo-input">
                <input type="password" id="password" placeholder="Contraseña" required>
            </div>

            <div class="grupo-input">
                <input type="password" id="confirmPassword" placeholder="Confirmar contraseña" required>
            </div>

            <button type="submit">Registrarme</button>

            <p class="texto-login">
                ¿Ya tienes cuenta?
                <a href="#" class="abrir-login">Inicia sesión</a>
            </p>

        </form>

    </div>

</div>

</section>

<div id="footer"></div>

  <script>
document.getElementById("formRegistro").addEventListener("submit", function(e) {
    const password = document.getElementById("password").value.trim();
    const confirmPassword = document.getElementById("confirmPassword").value.trim();

    if (password !== confirmPassword) {
        e.preventDefault();
        alert("Las contraseñas no coinciden");
    }
});
</script>
<script src="../js/header_footer.js"></script>    
<script src="../js/login.js"></script>
</body>

</html>
