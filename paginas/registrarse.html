<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ENIT Academy</title>

<link rel="stylesheet" href="../css/registrarse.css">
<link rel="stylesheet" href="../css/header_footer.css">
<link rel="stylesheet" href="../css/login.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<header id="header"></header>
<div id="modal-container"></div>

<!-- SECCIÓN PRINCIPAL -->
<section class="seccion-register">

    <!-- CONTENEDOR -->
    <section class="register-box">

        <!-- BIENVENIDA -->
        <article class="lado-bienvenida">
            <h2>¡Únete hoy!</h2>
            <p>
                Crea tu cuenta y empieza a aprender inglés
                con cursos dinámicos, modernos y fáciles.
            </p>
        </article>

        <!-- FORMULARIO -->
        <article class="lado-formulario">

            <h3>Crear Cuenta</h3>

            <form id="formRegistro">

                <!-- NOMBRES -->
                <section class="fila-input">

                    <article class="grupo-input">
                        <label>Nombres Completos *</label>
                        <input type="text" id="nombre" placeholder="Piero Fernando" required>
                    </article>

                    <article class="grupo-input">
                        <label>Apellidos Completos *</label>
                        <input type="text" id="apellido" placeholder="Pérez Bernal" required>
                    </article>

                </section>

                <!-- EMAIL -->
                <section>
                    <article class="grupo-input">
                        <label>Correo Electrónico *</label>
                        <input type="email" id="email" placeholder="pieroperez@email.com" required>
                    </article>
                </section>

                <!-- TELÉFONO -->
                <section>
                    <article class="grupo-input">
                        <label>Teléfono (Opcional)</label>
                        <input type="tel" id="telefono" placeholder="+51 982 525 999">
                    </article>
                </section>

                <!-- PASSWORD -->
                <section>
                    <article class="grupo-input">
                        <label>Contraseña *</label>
                        <small>Mínimo 6 caracteres</small>

                        <section class="input-wrapper">
                            <input type="password" id="password" placeholder="Contraseña segura" required>
                            <i class="fa-solid fa-eye toggle-password"></i>
                        </section>
                    </article>
                </section>

                <!-- CONFIRM PASSWORD -->
                <section>
                    <article class="grupo-input">
                        <label>Confirmar Contraseña *</label>
                        <small>Repite tu contraseña</small>

                        <section class="input-wrapper">
                            <input type="password" id="confirmPassword" placeholder="Repite tu contraseña" required>
                            <i class="fa-solid fa-eye toggle-password"></i>
                        </section>
                    </article>
                </section>

                <button type="submit">Registrarme</button>

                <p class="texto-login">
                    ¿Ya tienes cuenta?
                    <a href="#" class="abrir-login">Inicia sesión</a>
                </p>

            </form>

        </article>

    </section>

</section>

<footer id="footer"></footer>

<script src="../js/header_footer.js"></script>
<script src="../js/login.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
document.addEventListener("DOMContentLoaded", () => {

    const supabaseClient = supabase.createClient(
        "https://ugjgpirjcmyjfsgspajd.supabase.co",
        "TU_ANON_KEY"
    );

    const form = document.getElementById("formRegistro");
    const password = document.getElementById("password");
    const confirm = document.getElementById("confirmPassword");

    // 👁 Toggle password
    document.querySelectorAll(".toggle-password").forEach(icon => {
        icon.addEventListener("click", () => {
            const input = icon.previousElementSibling;
            input.type = input.type === "password" ? "text" : "password";
            icon.classList.toggle("fa-eye");
            icon.classList.toggle("fa-eye-slash");
        });
    });

    // Validación
    function validar() {
        confirm.setCustomValidity(
            confirm.value !== password.value ? "Las contraseñas no coinciden" : ""
        );
    }

    password.addEventListener("input", validar);
    confirm.addEventListener("input", validar);

    // Registro
    form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const dataForm = {
            nombre: nombre.value.trim(),
            apellido: apellido.value.trim(),
            email: email.value.trim(),
            password: password.value.trim(),
            telefono: telefono.value.trim()
        };

        const { data, error } = await supabaseClient.auth.signUp({
            email: dataForm.email,
            password: dataForm.password
        });

        if (error) return alert(error.message);

        const { error: insertError } = await supabaseClient
            .from("usuarios")
            .insert([{ id: data.user.id, ...dataForm }]);

        if (insertError) return alert(insertError.message);

        alert("Usuario registrado 🎉");
    });

});
</script>

</body>
</html>
</body>
</html>
