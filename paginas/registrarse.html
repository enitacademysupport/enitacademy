<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ENIT Academy</title>

<link rel="stylesheet" href="../css/registrarse.css">
<link rel="stylesheet" href="../css/header_footer.css">
<link rel="stylesheet" href="../css/login.css">
<link rel="stylesheet" href="/css/inicio.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<div id="header"></div>
<div id="modal-container"></div>

<section class="seccion-register">

<div class="register-box">

    <div class="lado-bienvenida">
        <h2>¡Únete hoy!</h2>
        <p>
            Crea tu cuenta y empieza a aprender inglés
            con cursos dinámicos, modernos y fáciles.
        </p>
    </div>

    <div class="lado-formulario">

        <h3>Crear Cuenta</h3>

<form id="registerForm">

    <div class="grupo-input">
        <input type="text" id="nombre" name="nombre" placeholder="Nombre">
        <small class="error"></small>
    </div>

    <div class="grupo-input">
        <input type="text" id="apellido" name="apellido" placeholder="Apellido">
        <small class="error"></small>
    </div>

    <div class="grupo-input">
        <input type="email" id="email" name="email" placeholder="Correo electrónico">
        <small class="error"></small>
    </div>

    <div class="grupo-input">
        <input type="password" id="password" name="password" placeholder="Contraseña">
        <small class="error"></small>
    </div>

    <div class="grupo-input">
        <input type="password" id="confirmar" name="confirmar" placeholder="Confirmar contraseña">
        <small class="error"></small>
    </div>

    <button type="submit" id="btnRegister">Registrarme</button>

</form>
    </div>

</div>

</section>

<div id="footer"></div>

<script type="module" src="../js/header_footer.js"></script>
<script type="module" src="../js/registro.js"></script>
</body>
</html>
