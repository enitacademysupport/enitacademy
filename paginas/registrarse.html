<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ENIT Academy — Registro</title>

    <!-- Aplicar modo oscuro ANTES de renderizar para evitar flash -->
  <script>if(localStorage.getItem("modoOscuro")==="true")document.documentElement.classList.add("dark"),document.body&&document.body.classList.add("dark");</script>
  <link rel="stylesheet" href="../css/header_footer.css">
  <link rel="stylesheet" href="../css/login.css">
  <link rel="stylesheet" href="/css/index.css">
  <link rel="stylesheet" href="../css/registrarse.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Paytone+One&display=swap" rel="stylesheet">
  
</head>

<body>
  <div id="header"></div>
  <div id="modal-container"></div>

  <section class="seccion-register">
    <div class="register-box">

      <!-- Lado izquierdo -->
      <div class="lado-bienvenida">
        <h2>¡Únete hoy!</h2>
        <p>Crea tu cuenta y empieza a aprender inglés con cursos dinámicos, modernos y fáciles.</p>
      </div>

      <!-- Lado derecho -->
      <div class="lado-formulario">

        <!-- PASO 1: Rol -->
        <div id="stepRol" class="step">
          <h3>¿Cuál es tu rol?</h3>
          <p class="subtitulo">Elige cómo usarás ENIT Academy</p>

          <div class="rol-opciones">
            <div class="rol-card" data-rol="estudiante" onclick="elegirRol(this)">
              <i class="fa-solid fa-user-graduate"></i>
              <span>Estudiante</span>
            </div>
            <div class="rol-card" data-rol="docente" onclick="elegirRol(this)">
              <i class="fa-solid fa-chalkboard-teacher"></i>
              <span>Docente</span>
            </div>
          </div>

          <button class="btn-primary" id="btnContinuar" disabled onclick="mostrarFormulario()">
            Continuar <i class="fa-solid fa-arrow-right"></i>
          </button>
        </div>

        <!-- PASO 2: Formulario -->
        <div id="stepForm" class="step step-oculto">
          <h3>Crear Cuenta</h3>

          <div class="rol-badge" id="rolBadge" onclick="volverARol()">
            <i id="badgeIcono" class="fa-solid fa-user-graduate"></i>
            <span id="badgeTexto">Estudiante</span>
            <span class="badge-cambiar">· cambiar</span>
          </div>

          <form id="registerForm" novalidate>
            <input type="hidden" id="rolSeleccionado" name="rol">

            <div class="grupo-input">
              <label for="nombre">Nombre</label>
              <input type="text" id="nombre" name="nombre" placeholder="Lucero" autocomplete="given-name">
              <small class="error"></small>
            </div>

            <div class="grupo-input">
              <label for="apellido">Apellido</label>
              <input type="text" id="apellido" name="apellido" placeholder="Callañaupa" autocomplete="family-name">
              <small class="error"></small>
            </div>

            <div class="grupo-input">
              <label for="email">Correo electrónico</label>
              <input type="email" id="email" name="email" placeholder="lucero@correo.com" autocomplete="email">
              <small class="error"></small>
            </div>

            <div class="grupo-input campo-password">
              <label for="password">Contraseña</label>
              <div class="input-wrapper">
                <input type="password" id="password" name="password" placeholder="Mínimo 6 caracteres" autocomplete="new-password">
                <button type="button" class="toggle-pw" aria-label="Mostrar contraseña" data-target="password">
                  <i class="fa-regular fa-eye"></i>
                </button>
              </div>
              <small class="error"></small>
            </div>

            <div class="grupo-input campo-password">
              <label for="confirmar">Confirmar contraseña</label>
              <div class="input-wrapper">
                <input type="password" id="confirmar" name="confirmar" placeholder="Repite tu contraseña" autocomplete="new-password">
                <button type="button" class="toggle-pw" aria-label="Mostrar contraseña" data-target="confirmar">
                  <i class="fa-regular fa-eye"></i>
                </button>
              </div>
              <small class="error"></small>
            </div>

            <!-- Alerta de feedback (éxito o error general) -->
            <div id="formAlerta" class="form-alerta" role="alert" aria-live="polite"></div>

            <button type="submit" id="btnRegister" class="btn-primary">Registrarme</button>
          </form>
        </div>

      </div>
    </div>
  </section>

  <div id="footer"></div>

    <script type="module" src="../js/header_footer.js"></script>
  <script type="module" src="../js/registro.js"></script>
  <script type="module" src="/js/login.js"></script>
</body>
</html>
