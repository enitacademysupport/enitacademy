<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ENIT Academy</title>

<link rel="stylesheet" href="../css/registrarse.css">
<link rel="stylesheet" href="../css/header_footer.css">
<link rel="stylesheet" href="../css/login.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>
    
<body>

<div id="header"></div>
<div id="modal-container"></div>

<section class="seccion-register">

<div class="register-box">

    <!-- IZQUIERDA -->
    <div class="lado-bienvenida">
        <h2>¡Únete hoy!</h2>
        <p>
            Crea tu cuenta y empieza a aprender inglés
            con cursos dinámicos, modernos y fáciles.
        </p>
    </div>

    <!-- FORMULARIO -->
    <div class="lado-formulario">

        <h3>Crear Cuenta</h3>

        <form id="formRegistro">

            <div class="fila-input">

                <div class="grupo-input">
                    <input type="text" id="nombre" placeholder="Nombre" required>
                </div>

                <div class="grupo-input">
                    <input type="text" id="apellido" placeholder="Apellido" required>
                </div>

            </div>

            <div class="grupo-input">
                <input type="email" id="email" placeholder="Correo electrónico" required>
            </div>

            <div class="grupo-input">
                <input type="password" id="password" placeholder="Contraseña" autocomplete="new-password" required>
            </div>

            <div class="grupo-input">
                <input type="password" id="confirmPassword" placeholder="Confirmar contraseña" autocomplete="new-password" required>
            </div>

            <button type="submit">Registrarme</button>

        </form>

    </div>

</div>

</section>

<div id="footer"></div>

<script src="/js/header_footer.js"></script>
<script src="/js/login.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const supabaseUrl = "https://qrdxcsttzeqkufdmzllj.supabase.co";
const supabaseKey = "sb_publishable_OdCflpNzeuD1K7Tv-ssC9A_IPx9VEoE"; // pega tu key

const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
</script>

    <script>
document.addEventListener("DOMContentLoaded", function(){

    const form = document.getElementById("formRegistro");

    form.addEventListener("submit", async function(e){
        e.preventDefault();

        const nombre = document.getElementById("nombre").value;
        const apellido = document.getElementById("apellido").value;
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;
        const confirmPassword = document.getElementById("confirmPassword").value;

        // 🔒 VALIDACIÓN SIMPLE Y SEGURA
        if(password !== confirmPassword){
            alert("❌ Las contraseñas no coinciden");
            return;
        }

        if(password.length < 6){
            alert("❌ La contraseña debe tener mínimo 6 caracteres");
            return;
        }

        try {

            // 🔐 REGISTRO EN AUTH
            const { data, error } = await supabase.auth.signUp({
                email: email,
                password: password
            });

            if(error){
                alert("Error: " + error.message);
                return;
            }

            const user = data.user;

            if(!user){
                alert("No se pudo crear el usuario");
                return;
            }

            // 💾 GUARDAR EN TABLA
            const { error: errorDB } = await supabase
                .from("usuarios")
                .insert([
                    {
                        id: user.id,
                        nombre: nombre,
                        apellido: apellido,
                        email: email
                    }
                ]);

            if(errorDB){
                alert("Error guardando en base de datos");
                return;
            }

            alert("✅ Usuario registrado correctamente");

            form.reset();

        } catch (err){
            console.error(err);
            alert("Error inesperado");
        }

    });

});
</script>
</body>
</html>
