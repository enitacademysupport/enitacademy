<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ENIT Academy</title>

<link rel="stylesheet" href="../css/registrarse.css">
<link rel="stylesheet" href="../css/header_footer.css">
<link rel="stylesheet" href="../css/login.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<header id="header"></header>
<div id="modal-container"></div>

<main class="seccion-register">

    <section class="register-box">

        <article class="lado-bienvenida">
            <h2>¡Únete hoy!</h2>
            <p>
                Crea tu cuenta y empieza a aprender inglés
                con cursos dinámicos, modernos y fáciles.
            </p>
        </article>

        <article class="lado-formulario">

            <h3>Crear Cuenta</h3>

            <form id="formRegistro">

                <section class="fila-input">
                    <article class="grupo-input">
                        <label>Nombres Completos *</label>
                        <input type="text" id="nombre" placeholder="Piero Fernando" required>
                    </article>

                    <article class="grupo-input">
                        <label>Apellidos Completos *</label>
                        <input type="text" id="apellido" placeholder="Pérez Bernal" required>
                    </article>
                </section>

                <section>
                    <article class="grupo-input">
                        <label>Correo Electrónico *</label>
                        <input type="email" id="email" placeholder="pieroperez@email.com" required>
                    </article>
                </section>

                <section>
                    <article class="grupo-input">
                        <label>Teléfono (Opcional)</label>
                        <input type="tel" id="telefono" placeholder="+51 982 525 999">
                    </article>
                </section>

                <section>
                    <article class="grupo-input">
                        <label>Contraseña *</label>
                        <small>Mínimo 6 caracteres</small>

                        <section class="input-wrapper">
                            <input type="password" id="password" required>
                            <i class="fa-solid fa-eye toggle-password"></i>
                        </section>
                    </article>
                </section>

                <section>
                    <article class="grupo-input">
                        <label>Confirmar Contraseña *</label>

                        <section class="input-wrapper">
                            <input type="password" id="confirmPassword" required>
                            <i class="fa-solid fa-eye toggle-password"></i>
                        </section>
                    </article>
                </section>

                <button type="submit">Registrarme</button>

                <p class="texto-login">
                    ¿Ya tienes cuenta?
                    <a href="#" class="abrir-login">Inicia sesión</a>
                </p>

            </form>

        </article>

    </section>

</main>

<footer id="footer"></footer>

<script src="../js/header_footer.js"></script>
<script src="../js/login.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
document.addEventListener("DOMContentLoaded", () => {

    const supabaseClient = supabase.createClient(
        "https://ugjgpirjcmyjfsgspajd.supabase.co",
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVnamdwaXJqY215amZzZ3NwYWpkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4NDI2MDAsImV4cCI6MjA5MzQxODYwMH0.OuERi9MUuFbxnC2Jvj_bjO4W90FbHagBKmvPSsd6Hm4"
    );

    const form = document.getElementById("formRegistro");
    const password = document.getElementById("password");
    const confirm = document.getElementById("confirmPassword");

    // 👁 Mostrar / ocultar contraseña
    document.querySelectorAll(".toggle-password").forEach(icon => {
        icon.addEventListener("click", () => {
            const input = icon.previousElementSibling;
            input.type = input.type === "password" ? "text" : "password";
            icon.classList.toggle("fa-eye");
            icon.classList.toggle("fa-eye-slash");
        });
    });

    // Validar contraseñas
    function validar() {
        confirm.setCustomValidity(
            confirm.value !== password.value ? "Las contraseñas no coinciden" : ""
        );
    }

    password.addEventListener("input", validar);
    confirm.addEventListener("input", validar);

    // Registro
    form.addEventListener("submit", async (e) => {
        e.preventDefault();

        // Validación extra
        if (password.value.length < 6) {
            alert("La contraseña debe tener mínimo 6 caracteres");
            return;
        }

        const dataForm = {
            nombre: nombre.value.trim(),
            apellido: apellido.value.trim(),
            email: email.value.trim(),
            telefono: telefono.value.trim()
        };

        // 🔐 Auth
        const { data, error } = await supabaseClient.auth.signUp({
            email: dataForm.email,
            password: password.value
        });

        if (error) {
            alert(error.message);
            return;
        }

        // 💾 Guardar usuario
        const { error: insertError } = await supabaseClient
            .from("usuarios")
            .insert([{
                id: data.user.id,
                ...dataForm
            }]);

        if (insertError) {
            alert(insertError.message);
            return;
        }

        alert("Usuario registrado correctamente 🎉");

    });

});
</script>

</body>
</html>
