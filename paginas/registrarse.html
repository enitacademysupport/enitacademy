<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ENIT Academy</title>
<link rel="stylesheet" href="../css/registrarse.css">
<link rel="stylesheet" href="../css/header_footer.css">
<link rel="stylesheet" href="../css/login.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
<!-- ========================= -->
<!--      INICIAR SESIÓN      -->
<!-- ========================= -->
<div id="header"></div>
<div id="modal-container"></div>
<!-- ========================= -->
<!--        REGISTRARSE       -->
<!-- ========================= -->

<section class="seccion-register">

<div class="register-box">

    <!-- LADO IZQUIERDO -->
    <div class="lado-bienvenida">

        <h2>¡Únete hoy!</h2>

        <p>
            Crea tu cuenta y empieza a aprender inglés
            con cursos dinámicos, modernos y fáciles.
        </p>

    </div>


    <!-- FORMULARIO -->
    <div class="lado-formulario">

        <h3>Crear Cuenta</h3>

        <form id="formRegistro">

            <div class="fila-input">

                <div class="grupo-input">
                    <input type="text" id="nombre" placeholder="Nombre">
                </div>

                <div class="grupo-input">
                    <input type="text" id="apellido" placeholder="Apellido">
                </div>

            </div>

            <div class="grupo-input">
                <input type="email" id="email" placeholder="Correo electrónico">
            </div>

            <div class="grupo-input">
                <input type="password" id="password" placeholder="Contraseña">
            </div>

            <div class="grupo-input">
                <input type="password" id="confirmPassword" placeholder="Confirmar contraseña">
            </div>

            <button type="submit">Registrarme</button>

            <p class="texto-login">
                ¿Ya tienes cuenta?
                <a href="../paginas/login.html">Inicia sesión</a>
            </p>

        </form>

    </div>

</div>

</section>


<div id="footer"></div>

<script src="/js/header_footer.js"></script>
<script src="/js/login.js"></script>
<script src="/js/registro.js"></script>
</body>

</html>
