<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ENIT Academy</title>
<link rel="stylesheet" href="../css/registrarse.css">
<link rel="stylesheet" href="../css/header_footer.css">
<link rel="stylesheet" href="../css/login.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
<!-- ========================= -->
<!--      INICIAR SESIÓN      -->
<!-- ========================= -->
<div id="header"></div>
<div id="modal-container"></div>
<!-- ========================= -->
<!--        REGISTRARSE       -->
<!-- ========================= -->

<section class="seccion-register">

<div class="register-box">

    <!-- LADO IZQUIERDO -->
    <div class="lado-bienvenida">

        <h2>¡Únete hoy!</h2>

        <p>
            Crea tu cuenta y empieza a aprender inglés
            con cursos dinámicos, modernos y fáciles.
        </p>

    </div>


    <!-- FORMULARIO -->
    <div class="lado-formulario">

        <h3>Crear Cuenta</h3>

        <form>

            <div class="fila-input">

                <div class="grupo-input">
                    <input type="text" name="nombre" placeholder="Nombre">
                </div>

                <div class="grupo-input">
                    <input type="text"  name="apellido" placeholder="Apellido">
                </div>

            </div>

            <div class="grupo-input">
                <input type="email" name="email" placeholder="Correo electrónico">
            </div>

           <div class="grupo-input password-container">
                <input type="password" name="password" placeholder="Contraseña" id="password">
            </div>

            <div class="grupo-input password-container">
                <input type="password" name="confirmPassword" placeholder="Confirmar contraseña" id="confirmPassword">
                <i class="fa-solid fa-eye toggle-password" data-target="confirmPassword"></i>
            </div>

         
            <button type="submit">Registrarme</button>

            <p class="texto-login">
                ¿Ya tienes cuenta?
                <a href="../paginas/login.html">Inicia sesión</a>
            </p>

        </form>

    </div>

</div>

</section>


<div id="footer"></div>

<script src="/js/header_footer.js"></script>
<script src="/js/login.js"></script>
<script>
    document.querySelectorAll(".toggle-password").forEach(icon => {
    icon.addEventListener("click", () => {
        const input = document.getElementById(icon.getAttribute("data-target"));

        if (input.type === "password") {
            input.type = "text";
            icon.classList.remove("fa-eye");
            icon.classList.add("fa-eye-slash");
        } else {
            input.type = "password";
            icon.classList.remove("fa-eye-slash");
            icon.classList.add("fa-eye");
        }
    });
});
</script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
const supabase = window.supabase.createClient(

);
</script>

    <script>
const form = document.querySelector("form");

form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const nombre = form.nombre.value;
    const apellido = form.apellido.value;
    const email = form.email.value;
    const password = form.password.value;
    const confirmPassword = form.confirmPassword.value;

    if (password !== confirmPassword) {
        alert("Las contraseñas no coinciden");
        return;
    }

    // 1. Registro en Auth
    const { data, error } = await supabase.auth.signUp({
        email: email,
        password: password
    });

    if (error) {
        alert("Error: " + error.message);
        return;
    }

    // ⚠️ IMPORTANTE
    const user = data.user;

    if (!user) {
        alert("Revisa tu correo para confirmar la cuenta antes de guardar datos");
        return;
    }

    // 2. Insertar en tu tabla
    const { error: insertError } = await supabase
        .from("usuarios")
        .insert([
            {
                user_id: user.id,
                nombre: nombre,
                apellido: apellido,
                email: email
            }
        ]);

    if (insertError) {
        alert("Error guardando datos: " + insertError.message);
    } else {
        alert("Usuario registrado correctamente 🚀");
    }
});
</script>
</body>

</html>
