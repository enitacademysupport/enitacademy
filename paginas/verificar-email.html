<!DOCTYPE html>
<html lang="es" data-bs-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verificar correo — ENIT Academy</title>
  <script>const dm=localStorage.getItem("modoOscuro")==="true";if(dm){document.documentElement.setAttribute("data-bs-theme","dark");document.documentElement.classList.add("dark");}</script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Paytone+One&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/header_footer.css">
  <link rel="stylesheet" href="/css/verificar-email.css">
</head>
<body>

<header id="header"></header>

<main class="verificar-main">
  <div class="card">
    <div class="card-header">
      <div class="card-logo">ENIT Academy</div>
      <div class="icon-wrap">✉️</div>
      <h1>Verifica tu correo</h1>
      <p>Enviamos un código de <span>6 dígitos</span> a<br><span id="email-display">tu correo electrónico</span></p>
    </div>

    <div class="card-body" id="form-view">
      <div class="otp-row" id="otp-row">
        <input class="otp-input" type="text" inputmode="numeric" maxlength="1" autocomplete="one-time-code" data-index="0">
        <input class="otp-input" type="text" inputmode="numeric" maxlength="1" data-index="1">
        <input class="otp-input" type="text" inputmode="numeric" maxlength="1" data-index="2">
        <input class="otp-input" type="text" inputmode="numeric" maxlength="1" data-index="3">
        <input class="otp-input" type="text" inputmode="numeric" maxlength="1" data-index="4">
        <input class="otp-input" type="text" inputmode="numeric" maxlength="1" data-index="5">
      </div>
      <div class="feedback" id="feedback"></div>
      <button class="btn-verify" id="btn-verify" disabled>
        <span class="spinner"></span>
        <span class="btn-label">✓ Verificar cuenta</span>
      </button>
      <div class="resend">
        ¿No llegó el correo?&nbsp;
        <button id="btn-resend" disabled>Reenviar código <span id="countdown"></span></button>
      </div>
    </div>

    <div class="success-overlay" id="success-view">
      <div class="check-circle">✓</div>
      <h2>¡Cuenta verificada!</h2>
      <p>Redirigiendo a tu panel…</p>
    </div>
  </div>
</main>

<footer id="footer"></footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/verificar_email.js"></script>
<script type="module" src="/js/header_footer.js"></script>
<script type="module" src="/js/login.js"></script>
</body>
</html>
